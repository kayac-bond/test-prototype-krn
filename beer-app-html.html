/* ---- inline icons (lucide風) ---- */
const I = (props) => {

  return (<svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">{children}</svg>);

const Home = (p) => <I {...p}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /><polyline points="9 22 9 12 15 12 15 22" /></I>;

  ren: { greet: "ナイスだ。", praise: "95点、S評価。泡の仕上がりが安定してきたな。", tip: "明日は注ぎ角度を45°に。色の評価がもう一段上がる。", badge: "7日連続S評価。お前のリズムは本物だ。" },
  hop: { greet: "ホップ〜！", praise: "95点だホップ！あわあわ最高だったホップ！🍺", tip: "つぎは45°でそそぐといいホップ！いろがキレイになるホップ！", badge: "7にちれんぞくSだホップ！！すごすぎるホップ🎉" },
  oni: { greet: "報告を聞こう。", praise: "95点、S評価。よくやった。だが慢心するな。", tip: "明日は注ぎ角度を45°に矯正しろ。色の精度が甘い。以上。", badge: "7日連続S評価。よくぞ続けた。明日も気を抜くな。" },

const STATS = [{ label: "泡", v: 100 }, { label: "色", v: 90 }, { label: "濁度", v: 95 }, { label: "透明度", v: 92 }];
const RADAR = [{ label: "泡", v: 100 }, { label: "色", v: 90 }, { label: "濁度", v: 95 }, { label: "透明度", v: 92 }, { label: "ツヤ", v: 94 }];

const RANK = [
  { r: 1, name: "新宿東口店", area: "首都圏", s: "96.2", d: "+1.8", up: true },
  { r: 2, name: "梅田店", area: "関西", s: "95.7", d: "+0.9", up: true },
  { r: 3, name: "渋谷センター店", area: "首都圏", s: "95.0", d: "+2.3", up: true, me: true, prize: true },
  { r: 4, name: "名古屋栄店", area: "中部", s: "94.8", d: "−0.4", up: false },
  { r: 5, name: "福岡天神店", area: "九州", s: "94.3", d: "+4.1", up: true },
];

const NOTES = {
  onboarding: { t: "S0. キャラ選択（初回のみ）", n: "選んだ相棒が通知・コーチ・称号・ランキングの全部の\"声\"になります。「推しに会いたい」が習慣化動機に。トーンが選べる＝キリン側がブランドトーンをダイヤルできる安心感も担保。画像分析ベンダーには作れない接点です。" },
  home: { t: "S2. ホーム", n: "主役は「今日の撮影」ボタン1つだけ。迷う要素を引き算し、ITリテラシーがばらつく現場でも誤操作しません。" },
  capture: { t: "S3. 撮影（★目玉）", n: "枠に合うと自動でシャッター。押す手間も「うまく撮る判断」もゼロ。同時に構図のバラつき（精度の敵）も物理的に解消。UXと精度を1機能で両取りします。" },
  analyzing: { t: "S4. 解析中", n: "待つだけ。操作なし。待ち時間すらキャラの接点に変えますが、コアを止めないようスキップ可能。" },
  result: { t: "S5. スコア結果", n: "ここまで実質1タップ＋全自動で完結。二値ではなく段階評価で、減点ではなく\"達成感\"で必ず終わります。" },
  coach: { t: "S6. コーチの一言", n: "明日の一手だけを短く。長文は任意の奥へ。\"読ませない\"こと自体が手間の削減＝教育コスト削減の核です。" },
  badge: { t: "S7. 称号イベント", n: "上位だけでなく伸び率も称える。誰でも主役になれる承認設計で、続けたくなる動機を駆動します。" },
  ranking: { t: "S9. ランキング", n: "隣の店との競争を可視化。日々の起動理由をつくり、本部の品質ノウハウ横展開の入口にも。" },
  record: { t: "S10. 記録", n: "達成の積み上げを見える化。「続けてよかった」を実感させ継続を後押しします。" },
};

function StatusBar() {
  return (
    <div className="flex justify-between items-center px-5 pt-2 pb-1 text-white text-xs">
      <span className="font-semibold">17:02</span>
      <div className="flex items-center gap-1"><Signal size={13} /> <Wifi size={13} color="#fff" /> <BatteryFull size={15} /></div>
    </div>
  );
}

function Bubble({ children, color }) {
  return (<div className="rounded-2xl rounded-tl-sm p-3 bg-neutral-800" style={{ borderLeft: `3px solid ${color}` }}><p className="text-white text-[13px] leading-relaxed">{children}</p></div>);
}

function Radar({ data, prog = 1 }) {
  const cx = 100, cy = 96, R = 56, n = data.length;
  const ang = (i) => (Math.PI * 2 * i) / n - Math.PI / 2;
  const pt = (i, r) => [cx + Math.cos(ang(i)) * r, cy + Math.sin(ang(i)) * r];
  const ring = (r) => data.map((_, i) => pt(i, R * r).join(",")).join(" ");
  const valPoly = data.map((d, i) => pt(i, R * (d.v / 100) * prog).join(",")).join(" ");
  return (
    <svg width="200" height="190" viewBox="0 0 200 190">
      {[0.25, 0.5, 0.75, 1].map((r) => <polygon key={r} points={ring(r)} fill="none" stroke="#333" strokeWidth="1" />)}
      {data.map((_, i) => { const [x, y] = pt(i, R); return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="#333" strokeWidth="1" />; })}
      <polygon points={valPoly} fill="#F5A62355" stroke="#F5A623" strokeWidth="2" />
      {data.map((d, i) => { const [x, y] = pt(i, R * (d.v / 100) * prog); return <circle key={i} cx={x} cy={y} r="3" fill="#F5A623" />; })}
      {data.map((d, i) => { const [lx, ly] = pt(i, R + 16); return <text key={i} x={lx} y={ly - 3} fill="#d4d4d8" fontSize="9" textAnchor="middle">{d.label}</text>; })}
      {data.map((d, i) => { const [lx, ly] = pt(i, R + 16); return <text key={"v" + i} x={lx} y={ly + 8} fill="#F5A623" fontSize="10" fontWeight="bold" textAnchor="middle">{d.v}</text>; })}
    </svg>
  );
}

function App() {
  const [screen, setScreen] = useState("onboarding");
  const [char, setChar] = useState(null);
  const [guide, setGuide] = useState(true);
  const [snap, setSnap] = useState(false);
  const [flash, setFlash] = useState(false);
  const [score, setScore] = useState(0);
  const [analyzeStep, setAnalyzeStep] = useState(0);
  const timers = useRef([]);

  const c = CHARS.find((x) => x.id === char) || CHARS[0];
  const L = LINES[char] || LINES.mirei;

  const clearTimers = () => { timers.current.forEach(clearTimeout); timers.current = []; };
  const go = (s) => { clearTimers(); setScreen(s); };

  useEffect(() => {
    if (screen !== "capture") { setSnap(false); setFlash(false); return; }
    setSnap(false); setFlash(false);
    timers.current.push(setTimeout(() => setSnap(true), 1400));
    timers.current.push(setTimeout(() => setFlash(true), 2200));
    timers.current.push(setTimeout(() => { setFlash(false); setScreen("analyzing"); }, 2600));
    return clearTimers;
  }, [screen]);

  useEffect(() => {
    if (screen !== "analyzing") { setAnalyzeStep(0); return; }
    setAnalyzeStep(0);
    [0, 1, 2, 3].forEach((i) => timers.current.push(setTimeout(() => setAnalyzeStep(i + 1), 450 * (i + 1))));
    timers.current.push(setTimeout(() => setScreen("result"), 2400));
    return clearTimers;
  }, [screen]);

  useEffect(() => {
    if (screen !== "result") { setScore(0); return; }
    let v = 0;
    const id = setInterval(() => { v += 3; if (v >= 95) { v = 95; clearInterval(id); } setScore(v); }, 28);
    return () => clearInterval(id);
  }, [screen]);

  const reset = () => { clearTimers(); setChar(null); setScreen("onboarding"); };

  const Nav = () => (
    <div className="flex justify-around items-center border-t border-neutral-800 py-2.5 bg-neutral-950">
      {[["home", Home, "ホーム"], ["ranking", Trophy, "ランキング"], ["record", BarChart3, "記録"]].map(([s, Ic, lb]) => (
        <button key={s} onClick={() => go(s)} className="flex flex-col items-center gap-0.5" style={{ color: screen === s ? KIRIN : "#6b7280" }}>
          <Ic size={20} color={screen === s ? KIRIN : "#6b7280"} /><span className="text-[10px]">{lb}</span>
        </button>
      ))}
    </div>
  );

  return (
    <div className="w-full min-h-screen flex flex-col items-center py-6 px-3" style={{ background: "#f4f4f5" }}>
      <div className="w-full max-w-md flex items-center justify-between mb-4 px-1">
        <div>
          <h1 className="font-bold text-neutral-800 text-sm sm:text-base">ビアグレード｜プロトタイプ</h1>
          <p className="text-[11px] text-neutral-500">タップして一周触ってみてください</p>
        </div>
        <div className="flex gap-1.5">
          <button onClick={() => setGuide((g) => !g)} className="flex items-center gap-1 text-[11px] px-2.5 py-1.5 rounded-full border" style={{ borderColor: guide ? KIRIN : "#d4d4d8", color: guide ? KIRIN : "#71717a" }}>
            <Lightbulb size={13} color={guide ? KIRIN : "#71717a"} /> 解説{guide ? "ON" : "OFF"}
          </button>
          <button onClick={reset} className="flex items-center gap-1 text-[11px] px-2.5 py-1.5 rounded-full border border-neutral-300 text-neutral-600">
            <RotateCcwIcon /> 最初から
          </button>
        </div>
      </div>

      <div className="relative" style={{ width: 320 }}>
        <div className="relative rounded-[2.6rem] bg-black p-2.5 shadow-2xl" style={{ boxShadow: "0 25px 60px -15px rgba(0,0,0,.4)" }}>
          <div className="rounded-[2.1rem] overflow-hidden bg-neutral-950 relative" style={{ height: 620 }}>
            <div className="absolute top-2 left-1/2 -translate-x-1/2 w-24 h-5 bg-black rounded-full z-30" />
            <StatusBar />
            {flash && <div className="absolute inset-0 bg-white z-50" style={{ animation: "flashAnim .4s ease" }} />}

            <div className="h-[560px] flex flex-col">
              {screen === "onboarding" && (
                <div className="scr flex-1 flex flex-col px-5 pt-3 overflow-y-auto">
                  <div className="text-center mb-1">
                    <div className="inline-block px-3 py-1 rounded-full text-[10px] font-bold text-white mb-3" style={{ background: KIRIN }}>はじめまして</div>

                    {CHARS.map((ch) => (
                      <button key={ch.id} onClick={() => { setChar(ch.id); go("home"); }} className="rounded-2xl p-3 flex flex-col items-center border border-neutral-800 active:scale-95 transition" style={{ background: ch.bg }}>

                  <div className="pb-6 flex flex-col items-center gap-2">
                    <div className="w-16 h-16 rounded-full border-4 border-neutral-600 flex items-center justify-center"><div className="w-12 h-12 rounded-full bg-neutral-700" /></div>
                    <p className="text-[10px] font-bold flex items-center gap-1" style={{ color: "#4CC978" }}><Sparkles size={12} color="#4CC978" /> 自動シャッターON ・ 押す手間ゼロ</p>
                  </div>
                </div>
              )}

              {screen === "analyzing" && (
                <div className="scr flex-1 flex flex-col items-center justify-center px-8">
                  <div className="w-16 h-16 rounded-full border-4 border-neutral-700 mb-6" style={{ borderTopColor: KIRIN, animation: "spin .8s linear infinite" }} />
                  <p className="text-white font-bold mb-1">AIが解析中…</p>
                  <p className="text-neutral-500 text-[11px] mb-6">{c.name}が見ています</p>
                  <div className="w-full space-y-2">
                    {STATS.map((s, i) => (
                      <div key={s.label} className="flex items-center gap-3">
                        <span className="text-neutral-400 text-xs w-12">{s.label}</span>
                        <div className="flex-1 h-1.5 bg-neutral-800 rounded-full overflow-hidden"><div className="h-full rounded-full" style={{ width: analyzeStep > i ? "100%" : "0%", background: KIRIN, transition: "width .4s ease" }} /></div>
                        {analyzeStep > i && <span className="text-[10px]" style={{ color: "#4CC978" }}>✓</span>}
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {screen === "result" && (
                <div className="scr flex-1 flex flex-col px-5 pt-3 overflow-y-auto">
                  <div className="flex items-center mb-2"><button onClick={() => go("home")}><ChevronLeft color="#fff" /></button><span className="text-white text-sm font-semibold mx-auto">AI分析レポート</span></div>
                  <div className="flex items-center justify-center gap-4 mt-1 mb-2">
                    <div className="text-center"><div className="flex items-end justify-center"><span className="text-5xl font-black text-white leading-none">{score}</span><span className="text-neutral-400 mb-1.5 ml-1 text-sm">点</span></div><p className="text-neutral-500 text-[10px]">総合スコア</p></div>
                    <div className="w-14 h-14 rounded-full flex items-center justify-center font-black text-2xl" style={{ border: `3px solid #F5A623`, color: "#F5A623" }}>S</div>
                  </div>
                  <div className="rounded-2xl bg-neutral-900 p-2 mb-2"><p className="text-center text-[10px] font-bold text-neutral-300 mb-0.5">項目別スコアリング</p><div className="flex justify-center"><Radar data={RADAR} prog={score / 95} /></div></div>
                  <div className="rounded-xl p-2.5 mb-3 text-center" style={{ background: "#3a2e16" }}><p className="text-[12px] font-bold" style={{ color: "#F5A623" }}>✨ 今日も最高品質です！</p><p className="text-neutral-300 text-[10px] mt-0.5">いつもメンテナンスありがとうございます</p></div>
                  <button onClick={() => go("coach")} className="w-full rounded-xl py-3 font-bold text-white flex items-center justify-center gap-2 active:scale-[.98] transition" style={{ background: KIRIN }}>{c.emoji} {c.name}からのひとこと <ChevronRight size={16} color="#fff" /></button>
                </div>
              )}

              {screen === "coach" && (
                <div className="scr flex-1 flex flex-col px-5 pt-3">
                  <div className="flex items-center mb-3"><button onClick={() => go("result")}><ChevronLeft color="#fff" /></button><span className="text-white text-sm font-semibold mx-auto">{c.name}コーチ</span></div>
                  <div className="flex flex-col items-center mb-3"><div className="w-20 h-20 rounded-full flex items-center justify-center text-5xl" style={{ background: c.bg, border: `3px solid ${c.ring}` }}>{c.emoji}</div><p className="text-white font-bold mt-2">{c.name}</p></div>
                  <div className="space-y-2.5 flex-1">
                    <Bubble color={c.ring}>{L.greet}{L.praise}</Bubble>
                    <div className="rounded-2xl rounded-tl-sm p-3" style={{ background: "#1f1f1f", borderLeft: `3px solid ${KIRIN}` }}><p className="text-[10px] font-bold mb-1" style={{ color: KIRIN }}>明日の一手</p><p className="text-white text-[13px] leading-relaxed">{L.tip}</p></div>
                  </div>
                  <div className="flex gap-2 pb-4"><button className="flex-1 rounded-xl py-2.5 text-neutral-400 text-[12px] border border-neutral-700">詳しいレポート</button><button onClick={() => go("badge")} className="flex-1 rounded-xl py-2.5 font-bold text-white" style={{ background: KIRIN }}>次へ</button></div>
                </div>
              )}

              {screen === "badge" && (
                <div className="scr flex-1 flex flex-col items-center justify-center px-6 relative overflow-hidden">
                  {Array.from({ length: 28 }).map((_, i) => (<div key={i} className="absolute top-0" style={{ left: `${(i * 37) % 100}%`, width: 8, height: 8, borderRadius: i % 2 ? "50%" : 2, background: [KIRIN, "#F5A623", "#4CC978", "#fff", c.ring][i % 5], animation: `fall ${1.5 + (i % 5) * 0.4}s ${(i % 7) * 0.15}s ease-in infinite` }} />))}
                  <div className="w-28 h-28 rounded-full flex items-center justify-center mb-4 z-10" style={{ background: "radial-gradient(circle,#F5A62333,transparent)", border: "3px solid #F5A623" }}><Trophy size={52} color="#F5A623" /></div>
                  <p className="text-white text-lg font-black z-10">🏅 7日連続 S評価</p>
                  <p className="text-neutral-400 text-xs mb-4 z-10">達成おめでとうございます！</p>
                  <div className="rounded-2xl p-3 mb-5 z-10 max-w-[260px]" style={{ background: c.bg, border: `1px solid ${c.ring}55` }}><p className="text-white text-[12px] text-center leading-relaxed"><span className="text-lg mr-1">{c.emoji}</span>{L.badge}</p></div>
                  <div className="flex gap-2 z-10 w-full max-w-[260px]"><button onClick={() => go("ranking")} className="flex-1 rounded-xl py-2.5 font-bold text-white text-sm" style={{ background: KIRIN }}>ランキング</button><button onClick={() => go("home")} className="flex-1 rounded-xl py-2.5 text-neutral-300 text-sm border border-neutral-700">ホーム</button></div>
                </div>
              )}

              {screen === "ranking" && (<>
                <div className="scr flex-1 px-4 pt-2 overflow-y-auto">
                  <p className="text-white text-sm font-semibold text-center mb-3">全店 品質ランキング</p>
                  <div className="grid grid-cols-3 gap-2 mb-4">
                    {[["全店平均", "91.4", "+1.2"], ["測定実施率", "98%", ""], ["S評価店", "87", "店"]].map(([t, v, d]) => (<div key={t} className="bg-neutral-900 rounded-xl p-2 text-center"><p className="text-neutral-500 text-[8.5px]">{t}</p><p className="text-white font-bold text-base leading-tight">{v}</p><p className="text-[8px]" style={{ color: "#4CC978" }}>{d}</p></div>))}
                  </div>
                  <div className="space-y-2">
                    {RANK.map((x) => (
                      <div key={x.r} className="rounded-xl p-2.5 flex items-center gap-2.5" style={{ background: x.me ? "#2a1015" : "#171717", border: x.me ? `1px solid ${KIRIN}` : "1px solid transparent" }}>
                        <span className="w-6 text-center font-black" style={{ color: x.r <= 3 ? "#F5A623" : "#6b7280" }}>{x.r}</span>
                        <div className="flex-1"><p className="text-white text-[12px] font-semibold flex items-center gap-1.5">{x.name}{x.me && <span className="text-[8px] px-1 rounded text-white" style={{ background: KIRIN }}>自店</span>}{x.prize && <span className="text-[8px] px-1 rounded" style={{ background: "#3a2e16", color: "#F5A623" }}>改善賞</span>}</p><p className="text-neutral-500 text-[9px]">{x.area}</p></div>
                        <div className="text-right"><p className="text-white font-bold text-[13px]">{x.s}</p><p className="text-[9px]" style={{ color: x.up ? "#4CC978" : "#ef4444" }}>{x.d}</p></div>
                      </div>
                    ))}
                  </div>
                </div>
                <Nav />
              </>)}

              {screen === "record" && (<>
                <div className="scr flex-1 px-5 pt-2 overflow-y-auto">
                  <p className="text-white text-sm font-semibold text-center mb-3">継続記録</p>
                  <div className="rounded-2xl bg-neutral-900 p-4 mb-3">
                    <div className="flex justify-between items-center mb-3"><div className="flex items-center gap-2"><div className="w-9 h-9 rounded-lg flex items-center justify-center font-black" style={{ border: "2px solid #F5A623", color: "#F5A623" }}>A</div><div><p className="text-neutral-500 text-[9px]">直近7日の平均</p><p className="text-white font-bold">89点 <span className="text-[10px]" style={{ color: "#4CC978" }}>先週比 +6</span></p></div></div></div>
                    <div className="flex items-end justify-between gap-1.5 h-28">
                      {TREND.map((v, i) => (<div key={i} className="flex-1 flex flex-col items-center gap-1"><span className="text-[8px] text-neutral-400">{v}</span><div className="w-full rounded-t" style={{ height: `${(v - 70) * 2.6}px`, background: i === TREND.length - 1 ? KIRIN : "#F5A623" }} /><span className="text-[8px] text-neutral-600">{DAYS[i]}</span></div>))}
                    </div>
                  </div>
                  <div className="grid grid-cols-3 gap-2.5">
                    {[["平均", "89"], ["最高", "98"], ["連続", "12日"]].map(([t, v]) => (<div key={t} className="bg-neutral-900 rounded-xl p-3 text-center"><p className="text-neutral-500 text-[9px]">{t}</p><p className="text-white font-bold">{v}</p></div>))}
                  </div>
                </div>
                <Nav />
              </>)}
            </div>
          </div>
        </div>
      </div>

      {guide && NOTES[screen] && (
        <div className="w-full max-w-md mt-4 rounded-2xl p-4 bg-white border" style={{ borderColor: "#fca5a5" }}>
          <div className="flex items-center gap-2 mb-1.5"><Lightbulb size={15} color={KIRIN} /><span className="font-bold text-sm" style={{ color: KIRIN }}>{NOTES[screen].t}</span></div>
          <p className="text-neutral-700 text-[12.5px] leading-relaxed">{NOTES[screen].n}</p>
        </div>
      )}
    </div>
  );
}

const RotateCcwIcon = () => (<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#71717a" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10" /><path d="M3.5 15a9 9 0 1 0 2.1-9.4L1 10" /></svg>);

/* ---- パスワードゲート ---- */
function Gate({ onOk }) {
  const [v, setV] = useState("");
  const [err, setErr] = useState(false);
  const submit = () => { if (v === PASSWORD) onOk(); else setErr(true); };
  return (
    <div className="min-h-screen flex items-center justify-center px-4" style={{ background: "#0a0a0a" }}>
      <div className="w-full max-w-xs rounded-3xl p-7 text-center" style={{ background: "#161616", border: "1px solid #2a2a2a" }}>
        <div className="w-12 h-12 rounded-xl flex items-center justify-center text-white font-black text-xl mx-auto mb-4" style={{ background: KIRIN }}>B</div>
        <h1 className="text-white font-bold text-base">ビアグレード｜プロトタイプ</h1>
        <p className="text-neutral-500 text-[11px] mt-1 mb-5">閲覧にはパスワードが必要です</p>
        <input type="password" value={v} autoFocus
          onChange={(e) => { setV(e.target.value); setErr(false); }}
          onKeyDown={(e) => { if (e.key === "Enter") submit(); }}
          placeholder="パスワード"
          className="w-full rounded-xl px-4 py-2.5 text-center text-white text-sm outline-none mb-2"
          style={{ background: "#0a0a0a", border: `1px solid ${err ? KIRIN : "#333"}` }} />
        {err && <p className="text-[11px] mb-2" style={{ color: KIRIN }}>パスワードが違います</p>}
        <button onClick={submit} className="w-full rounded-xl py-2.5 font-bold text-white text-sm mt-1" style={{ background: KIRIN }}>開く</button>
      </div>
    </div>
  );
}

function Root() {
  const [ok, setOk] = useState(false);
  return ok ? <App /> : <Gate onOk={() => setOk(true)} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
</body>
</html>
